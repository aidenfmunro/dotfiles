monitor=eDP-1,1920x1200,auto,1
monitor=HDMI-A-1,1920x1080@60,0x0,1.25 # The montiro is LEFT

$terminal = kitty
$fileManager = dolphin
$menu = wofi --show drun

source = ~/.config/hypr/autostart.conf
source = ~/.config/hypr/bind.conf

$CURSOR_SIZE = 14

env = XCURSOR_SIZE, $CURSOR_SIZE
env = HYPRCURSOR_SIZE, $CURSOR_SIZE

general {
    gaps_in = 2
    gaps_out = 0

    border_size = 1

    
    col.active_border = rgba(ffff00ff) rgba(ffffffff) 45deg
    col.inactive_border = rgba(595959aa)

    
    resize_on_border = false

    
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 5 

    active_opacity = 1.0
    inactive_opacity = 1.0
    
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.01, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    pseudotile = true 
    preserve_split = true 
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1 
    disable_hyprland_logo = false 
}

input {
    kb_layout = us, ru
    kb_variant =
    kb_model =
    kb_options = grp:win_space_toggle, caps:swapescape
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 

    touchpad {
    	scroll_factor  = 0.5
        natural_scroll = true 
    }
}

gestures {
    workspace_swipe = false
}

device {
    name = epic-mouse-v1
    sensitivity = 0.5
}

gestures {
    workspace_swipe = true
}

# unscale XWayland

xwayland {
  force_zero_scaling = true
}
