##### General #######################################################

# modern, full color
set -g default-terminal "tmux-256color"

# make tmux feel snappy
set -s escape-time 10            # how long tmux waits after prefix
set -sg repeat-time 600          # repeatable key timeout (ms)
set -s focus-events on           # send focus in/out to panes (editors like this)

# keep lots of scrollback
set -g history-limit 10000

# use a single, easy prefix: Ctrl-a
set -g prefix C-a
unbind C-b
bind C-a send-prefix             # send literal C-a to programs if you need it

# (optional, but handy) reload config with prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

##### UI / display ##################################################

set -g base-index 1              # windows count from 1
setw -g pane-base-index 1        # panes count from 1

setw -g automatic-rename on      # window names follow active program
set -g renumber-windows on       # close gap when you kill a window

set -g set-titles on             # let tmux set terminal/tab title

set -g display-panes-time 800    # ms to show pane numbers after prefix+q
set -g display-time 1000         # ms for status messages
set -g status-interval 10        # redraw status line every 10s

# activity notifications
set -g monitor-activity on
set -g visual-activity off

##### Navigation: sessions / windows / panes ########################

# 1. sessions -------------------------------------------------------

# prefix + C-c : create a new session
bind C-c new-session

# prefix + C-f : fuzzy switch to another session by name
bind C-f command-prompt -p "find-session" "switch-client -t %%"

# prefix + BTab (Shift-Tab) : go to last session
bind BTab switch-client -l

# 2. windows --------------------------------------------------------

# prefix + C-h : previous window
bind -r C-h previous-window

# prefix + C-l : next window
bind -r C-l next-window

# prefix + C-S-h : move this window left in the list
bind -r C-S-h swap-window -t -1 \; select-window -t -1

# prefix + C-S-l : move this window right in the list
bind -r C-S-l swap-window -t +1 \; select-window -t +1

# prefix + Tab : toggle between last two windows
bind Tab last-window

# 3. panes ----------------------------------------------------------

# splits
# prefix + -  : horizontal split (new pane below)
bind - split-window -v

# prefix + |  : vertical split (new pane right)
bind \| split-window -h

# pane focus movement (vim style)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# swap panes in layout order
bind > swap-pane -D         # push current pane down
bind < swap-pane -U         # pull current pane up

# toggle zoom / "maximize" current pane
# prefix + + : zoom pane full screen, press again to restore
bind + resize-pane -Z

# resize panes with Shift+H/J/K/L
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

bind x kill-pane

##### Mouse toggle ##################################################

# mouse ON by default (nice for scroll + click-to-select panes)
set -g mouse on

# prefix + m : toggle mouse on/off inline (no external script)
bind m if -F '#{mouse}' \
  'set -g mouse off \; display "mouse OFF"' \
  'set -g mouse on  \; display "mouse ON"'

##### Clean screen / history #######################################

# prefix + C-l : clear current pane's screen AND scrollback
# (safer than stealing bare Ctrl-l globally)
bind C-l send-keys C-l \; run 'sleep 0.2' \; clear-history

##### Copy mode / clipboard ########################################

# prefix + Enter : enter copy mode (scrollback / select text)
bind Enter copy-mode

# use vi-style keys in copy mode
setw -g mode-keys vi

# visual selection, rectangle toggle, yank, etc.
bind -T copy-mode-vi v     send -X begin-selection
bind -T copy-mode-vi C-v   send -X rectangle-toggle
bind -T copy-mode-vi y     send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H     send -X start-of-line
bind -T copy-mode-vi L     send -X end-of-line

# prefix + y : copy last tmux selection into system clipboard
if -b 'command -v xsel >/dev/null 2>&1' \
    'bind y run -b "tmux save-buffer - | xsel -i -b"'
if -b '! command -v xsel >/dev/null 2>&1 && command -v xclip >/dev/null 2>&1' \
    'bind y run -b "tmux save-buffer - | xclip -i -selection clipboard >/dev/null 2>&1"'
if -b '[ \"$XDG_SESSION_TYPE\" = \"wayland\" ] && command -v wl-copy >/dev/null 2>&1' \
    'bind y run -b "tmux save-buffer - | wl-copy"'
if -b 'command -v pbcopy >/dev/null 2>&1' \
    'bind y run -b "tmux save-buffer - | pbcopy"'
if -b 'command -v clip.exe >/dev/null 2>&1' \
    'bind y run -b "tmux save-buffer - | clip.exe"'
if -b '[ -c /dev/clipboard ]' \
    'bind y run -b "tmux save-buffer - > /dev/clipboard"'

##### Buffers #######################################################

# prefix + b : list buffers
bind b list-buffers

# prefix + p : paste most recent buffer
bind p paste-buffer -p

# prefix + P : interactively choose buffer to paste
bind P choose-buffer

#### Plugins ########################################################

run ~/.config/tmux/plugins/tmux-gruvbox/gruvbox-tpm.tmux

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'egel/tmux-gruvbox'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @tmux-gruvbox 'dark'

# Enable automatic restore
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager 
run '~/.tmux/plugins/tpm/tpm'
